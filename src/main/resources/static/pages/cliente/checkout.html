<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-out - Hotel Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Check-out Online</h1>

        <div id="info-prenotazione">
            <p>Codice Prenotazione: <span id="codice"></span></p>
            <p>Camera: <span id="camera"></span></p>
            <p>Data Check-in: <span id="checkin-data"></span></p>
            <p>Data Check-out: <span id="checkout-data"></span></p>
            <p>Stato: <span id="stato"></span></p>
        </div>

        <button id="btn-checkout" class="btn">Effettua Check-out</button>
    </div>

    <script src="/js/cliente/checkout.js"></script>
</body>
</html>
